services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_PB_URL=${VITE_PB_URL}
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "5173:5173"
    environment:
      - VITE_PB_URL=${VITE_PB_URL}
      - VITE_API_URL=${VITE_API_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-router.rule=Host(`elevetoai.com`) || Host(`www.elevetoai.com`)"
      - "traefik.http.routers.frontend-router.entrypoints=websecure"
      - "traefik.http.routers.frontend-router.tls=true"
      - "traefik.http.routers.frontend-router.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend-service.loadbalancer.server.port=5173"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-router.rule=Host(`api-eleveto.31.97.231.139.sslip.io`)"
      - "traefik.http.routers.backend-router.entrypoints=websecure"
      - "traefik.http.routers.backend-router.tls=true"
      - "traefik.http.routers.backend-router.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend-service.loadbalancer.server.port=3001"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
