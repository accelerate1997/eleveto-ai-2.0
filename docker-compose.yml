services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_PB_URL=${VITE_PB_URL}
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "80:80"
    environment:
      - VITE_PB_URL=${VITE_PB_URL}
      - VITE_API_URL=${VITE_API_URL}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=3001
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
