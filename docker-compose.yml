services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_PB_URL=${VITE_PB_URL}
    ports:
      - "5173:80"
    environment:
      - VITE_PB_URL=${VITE_PB_URL}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - INSTANCE_NAME=${INSTANCE_NAME}
      - CALCOM_LINK=${CALCOM_LINK}
      - PORT=3001
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
